name: Deploy Pokemon Game to Web
on:
  push:
    branches:
      - main

jobs:
  build-n-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: |
          python -m pip install pygbag==0.8.4 

      - name: Build Web Version
        run: |
          # 加上 --archive 確保所有圖片檔案都被包進網頁包中
          python -m pygbag --build --archive main.py

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
