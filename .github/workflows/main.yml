name: Deploy Pokemon Game to Web
on:
  push:
    branches:
      - main

jobs:
  build-n-deploy:
    runs-on: ubuntu-latest
    # 這裡加入權限設定，確保 Actions 可以建立 gh-pages 分支
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pygbag
        run: |
          python -m pip install pygbag

      - name: Build Web Version
        run: |
          # 修正點：移除 --no_title 參數
          python -m pygbag --build main.py

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
