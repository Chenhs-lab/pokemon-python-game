name: Deploy Pokemon Game to Web
on:
  push:
    branches:
      - main

jobs:
  build-n-deploy:
    runs-on: ubuntu-latest
    # 這裡加入權限設定，確保 Actions 可以建立 gh-pages 分支
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

- name: Install Pygbag
        run: |
          # 指定安裝 0.8.4 版，這個版本在 GitHub Pages 上非常穩定
          python -m pip install pygbag==0.8.4 

      - name: Build Web Version
        run: |
          # 0.8.4 版的打包指令稍微不同，請用這行
          python -m pygbag --build main.py

      - name: Upload to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
